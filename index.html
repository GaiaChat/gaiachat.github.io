<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Download Gaia Launcher and Current Server for local-first chat, voice, and server hosting."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script
      id="gaia-adsense-script"
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1998367148417325"
      crossorigin="anonymous"
    ></script>
    <title>Gaia Launcher</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      const isViteDev =
        (location.hostname === 'localhost' || location.hostname === '127.0.0.1') &&
        location.port === '5173';

      if (isViteDev) {
        await import('/src/main.tsx');
      } else {
        const stylesheet = document.createElement('link');
        stylesheet.rel = 'stylesheet';
        stylesheet.href = '/assets/gaiachat-app.css';
        document.head.appendChild(stylesheet);

        await import('/assets/gaiachat-app.js');
      }
    </script>
  </body>
</html>
