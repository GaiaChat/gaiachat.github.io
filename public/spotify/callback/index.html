<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Spotify Connected - Gaia Launcher</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #07110d;
        color: #effff4;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: linear-gradient(155deg, #050806, #0a1510 54%, #091019);
      }

      main {
        width: min(460px, 100%);
        border: 1px solid rgba(239, 255, 244, 0.16);
        border-radius: 8px;
        padding: 24px;
        background: rgba(7, 17, 13, 0.84);
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.38);
      }

      .mark {
        width: 48px;
        height: 48px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        margin-bottom: 18px;
        background: #1ed760;
        color: #04140a;
        font-weight: 900;
        letter-spacing: 0;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.45rem;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: #bdd5c6;
        line-height: 1.5;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 40px;
        margin-top: 18px;
        border: 1px solid rgba(30, 215, 96, 0.46);
        border-radius: 8px;
        padding: 0 12px;
        color: #effff4;
        background: rgba(30, 215, 96, 0.14);
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">G</div>
      <h1 id="title">Returning to Gaia Launcher</h1>
      <p id="message">Spotify finished authorization. Gaia Launcher should continue automatically.</p>
      <a id="fallbackLink" hidden>Open Gaia Launcher</a>
    </main>
    <script>
      const callbackPath = '/spotify/oauth/callback';

      function decodeState(state) {
        try {
          const normalized = state.replace(/-/g, '+').replace(/_/g, '/');
          const padded = normalized.padEnd(Math.ceil(normalized.length / 4) * 4, '=');
          return JSON.parse(atob(padded));
        } catch {
          return null;
        }
      }

      function loopbackUrl() {
        const params = new URLSearchParams(window.location.search);
        const state = params.get('state') || '';
        const decoded = decodeState(state);
        const port = Number(decoded && decoded.port);
        if (!Number.isInteger(port) || port < 1 || port > 65535) {
          return null;
        }

        const target = new URL(callbackPath, `http://127.0.0.1:${port}`);
        for (const key of ['code', 'state', 'error']) {
          const value = params.get(key);
          if (value) {
            target.searchParams.set(key, value);
          }
        }
        return target.toString();
      }

      const title = document.getElementById('title');
      const message = document.getElementById('message');
      const fallbackLink = document.getElementById('fallbackLink');
      const target = loopbackUrl();

      if (target) {
        fallbackLink.href = target;
        fallbackLink.hidden = false;
        window.setTimeout(() => {
          window.location.replace(target);
        }, 250);
      } else {
        title.textContent = 'Gaia Launcher callback missing';
        message.textContent = 'Return to Gaia Launcher and start Spotify connection again.';
      }
    </script>
  </body>
</html>
