name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          VITE_ADSENSE_CLIENT: ${{ vars.VITE_ADSENSE_CLIENT }}
          VITE_ADSENSE_DOWNLOAD_SLOT: ${{ vars.VITE_ADSENSE_DOWNLOAD_SLOT }}
          VITE_SOURCE_URL: ${{ vars.VITE_SOURCE_URL }}
          VITE_GAIA_WINDOWS_URL: ${{ vars.VITE_GAIA_WINDOWS_URL }}
          VITE_GAIA_MAC_URL: ${{ vars.VITE_GAIA_MAC_URL }}
          VITE_GAIA_LINUX_URL: ${{ vars.VITE_GAIA_LINUX_URL }}
          VITE_CURRENT_SERVER_WINDOWS_URL: ${{ vars.VITE_CURRENT_SERVER_WINDOWS_URL }}
          VITE_CURRENT_SERVER_MAC_URL: ${{ vars.VITE_CURRENT_SERVER_MAC_URL }}
          VITE_CURRENT_SERVER_LINUX_URL: ${{ vars.VITE_CURRENT_SERVER_LINUX_URL }}
        run: pnpm build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
