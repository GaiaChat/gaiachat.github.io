name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.7
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply optional Vite env from repository variables
        shell: bash
        env:
          PAGES_VITE_ADSENSE_CLIENT: ${{ vars.VITE_ADSENSE_CLIENT }}
          PAGES_VITE_SOURCE_URL: ${{ vars.VITE_SOURCE_URL }}
          PAGES_VITE_GAIA_RELEASE_URL: ${{ vars.VITE_GAIA_RELEASE_URL }}
          PAGES_VITE_GAIA_APPIMAGE_URL: ${{ vars.VITE_GAIA_APPIMAGE_URL }}
          PAGES_VITE_GAIA_DEB_URL: ${{ vars.VITE_GAIA_DEB_URL }}
          PAGES_VITE_GAIA_RPM_URL: ${{ vars.VITE_GAIA_RPM_URL }}
          PAGES_VITE_GAIA_TARBALL_URL: ${{ vars.VITE_GAIA_TARBALL_URL }}
          PAGES_VITE_GAIA_USAGE_COUNT_URL: ${{ vars.VITE_GAIA_USAGE_COUNT_URL }}
          PAGES_VITE_CURRENT_RELEASE_URL: ${{ vars.VITE_CURRENT_RELEASE_URL }}
          PAGES_VITE_CURRENT_SOURCE_URL: ${{ vars.VITE_CURRENT_SOURCE_URL }}
          PAGES_VITE_CURRENT_SERVER_ARCHIVE_URL: ${{ vars.VITE_CURRENT_SERVER_ARCHIVE_URL }}
          PAGES_VITE_CURRENT_SERVER_MANIFEST_URL: ${{ vars.VITE_CURRENT_SERVER_MANIFEST_URL }}
        run: |
          rm -f .env.production.local

          append_env() {
            key="$1"
            value="$2"

            if [ -n "$value" ]; then
              printf '%s=%s\n' "$key" "$value" >> .env.production.local
            fi
          }

          append_env VITE_ADSENSE_CLIENT "$PAGES_VITE_ADSENSE_CLIENT"
          append_env VITE_SOURCE_URL "$PAGES_VITE_SOURCE_URL"
          append_env VITE_GAIA_RELEASE_URL "$PAGES_VITE_GAIA_RELEASE_URL"
          append_env VITE_GAIA_APPIMAGE_URL "$PAGES_VITE_GAIA_APPIMAGE_URL"
          append_env VITE_GAIA_DEB_URL "$PAGES_VITE_GAIA_DEB_URL"
          append_env VITE_GAIA_RPM_URL "$PAGES_VITE_GAIA_RPM_URL"
          append_env VITE_GAIA_TARBALL_URL "$PAGES_VITE_GAIA_TARBALL_URL"
          append_env VITE_GAIA_USAGE_COUNT_URL "$PAGES_VITE_GAIA_USAGE_COUNT_URL"
          append_env VITE_CURRENT_RELEASE_URL "$PAGES_VITE_CURRENT_RELEASE_URL"
          append_env VITE_CURRENT_SOURCE_URL "$PAGES_VITE_CURRENT_SOURCE_URL"
          append_env VITE_CURRENT_SERVER_ARCHIVE_URL "$PAGES_VITE_CURRENT_SERVER_ARCHIVE_URL"
          append_env VITE_CURRENT_SERVER_MANIFEST_URL "$PAGES_VITE_CURRENT_SERVER_MANIFEST_URL"

          if [ -s .env.production.local ]; then
            sed 's/=.*/=<set>/' .env.production.local
          else
            rm -f .env.production.local
            echo "No repository variables were set; using committed .env.production defaults."
          fi

      - name: Build
        run: pnpm build

      - name: Configure Pages
        uses: actions/configure-pages@v6.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
